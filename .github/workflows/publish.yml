name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: build-publish-faer-precond

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(
            cargo metadata --no-deps --format-version 1 |
              jq -r '.packages[] | select(.name == "faer-precond") | .version'
          )"

          if [[ -z "$CRATE_VERSION" ]]; then
            echo "::error::Could not find crate in Cargo metadata"
            exit 1
          fi

          if [[ "$TAG_VERSION" != "$CRATE_VERSION" ]]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $CRATE_VERSION"
            exit 1
          fi

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Dry run
        run: cargo publish --dry-run

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}